<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <!-- Soft radial gradients for smudges -->
    <radialGradient id="smudge1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15" />
      <stop offset="60%" stop-color="white" stop-opacity="0.08" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12" />
      <stop offset="50%" stop-color="white" stop-opacity="0.05" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.10" />
      <stop offset="70%" stop-color="white" stop-opacity="0.03" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>

    <!-- Linear gradient for swipe marks that fades at the edges -->
    <linearGradient id="swipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="20%" stop-color="white" stop-opacity="0.08" />
      <stop offset="50%" stop-color="white" stop-opacity="0.12" />
      <stop offset="80%" stop-color="white" stop-opacity="0.08" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Oily Smudges -->
  <!-- Swipe mark at the bottom -->
  <path d="M 60 330 Q 190 300 440 340" fill="none" stroke="url(#swipeGrad)" stroke-width="45" stroke-linecap="round" />
  
  <!-- Finger smudge 1 -->
  <ellipse cx="160" cy="140" rx="60" ry="50" transform="rotate(-30 160 140)" fill="url(#smudge1)" />
  
  <!-- Large corner smear -->
  <ellipse cx="380" cy="120" rx="80" ry="100" transform="rotate(25 380 120)" fill="url(#smudge2)" />

  <!-- Center palm/hand drag -->
  <ellipse cx="260" cy="250" rx="70" ry="70" fill="url(#smudge3)" />

  <!-- Fingerprint 1 (Index Finger) -->
  <g transform="translate(160, 260) rotate(-40) scale(1.2)" stroke="white" stroke-width="0.28" fill="none" stroke-linecap="round" opacity="0.18">
    <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
    <ellipse cx="-0.1" cy="0.3" rx="3.0" ry="4.4" />
    <ellipse cx="-0.2" cy="0.6" rx="4.5" ry="6.6" stroke-dasharray="50 1.2" />
    <ellipse cx="-0.3" cy="0.9" rx="6.0" ry="8.8" />
    <ellipse cx="-0.4" cy="1.2" rx="7.5" ry="11.0" stroke-dasharray="70 1.2 50 1.2" />
    <ellipse cx="-0.6" cy="1.8" rx="9.0" ry="13.2" />
    <ellipse cx="-0.6" cy="1.8" rx="10.5" ry="15.4" stroke-dasharray="90 1.5" />
    <ellipse cx="-0.7" cy="2.1" rx="12.0" ry="17.6" />
    <ellipse cx="-0.8" cy="2.4" rx="13.5" ry="19.8" stroke-dasharray="110 1.5 80 1.5" />
    <ellipse cx="-0.9" cy="2.7" rx="15.0" ry="22.0" />
    <ellipse cx="-1.0" cy="3.0" rx="16.5" ry="24.2" stroke-dasharray="130 1.5" />
    <ellipse cx="-1.1" cy="3.3" rx="18.0" ry="26.4" />
  </g>

  <!-- Fingerprint 2 (Middle Finger) -->
  <g transform="translate(340, 140) rotate(15) scale(1.05)" stroke="white" stroke-width="0.28" fill="none" stroke-linecap="round" opacity="0.18">
    <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
    <ellipse cx="0.2" cy="-0.3" rx="3.0" ry="4.4" />
    <ellipse cx="0.4" cy="-0.6" rx="4.5" ry="6.6" stroke-dasharray="40 1.2" />
    <ellipse cx="0.6" cy="-0.9" rx="6.0" ry="8.8" />
    <ellipse cx="0.8" cy="-1.2" rx="7.5" ry="11.0" stroke-dasharray="60 1.2 40 1.2" />
    <ellipse cx="1.0" cy="-1.5" rx="9.0" ry="13.2" />
    <ellipse cx="1.2" cy="-1.8" rx="10.5" ry="15.4" stroke-dasharray="80 1.5" />
    <ellipse cx="1.4" cy="-2.1" rx="12.0" ry="17.6" />
    <ellipse cx="1.6" cy="-2.4" rx="13.5" ry="19.8" stroke-dasharray="100 1.5 70 1.5" />
    <ellipse cx="1.8" cy="-2.7" rx="15.0" ry="22.0" />
    <ellipse cx="2.0" cy="-3.0" rx="16.5" ry="24.2" stroke-dasharray="120 1.5" />
    <ellipse cx="2.2" cy="-3.3" rx="18.0" ry="26.4" />
  </g>

  <!-- Fingerprint 3 (Thumb) -->
  <g transform="translate(220, 120) rotate(-10) scale(1.1)" stroke="white" stroke-width="0.28" fill="none" stroke-linecap="round" opacity="0.20">
    <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
    <ellipse cx="-0.2" cy="0.4" rx="3.0" ry="4.4" />
    <ellipse cx="0.3" cy="-0.5" rx="4.5" ry="6.6" stroke-dasharray="45 1.2" />
    <ellipse cx="-0.4" cy="0.6" rx="6.0" ry="8.8" />
    <ellipse cx="0.5" cy="-0.7" rx="7.5" ry="11.0" stroke-dasharray="65 1.2 35 1.2" />
    <ellipse cx="-0.6" cy="0.8" rx="9.0" ry="13.2" />
    <ellipse cx="0.7" cy="-0.9" rx="10.5" ry="15.4" stroke-dasharray="85 1.5" />
    <ellipse cx="-0.8" cy="1.0" rx="12.0" ry="17.6" />
    <ellipse cx="0.9" cy="-1.1" rx="13.5" ry="19.8" stroke-dasharray="105 1.5 65 1.5" />
    <ellipse cx="-1.0" cy="1.2" rx="15.0" ry="22.0" />
    <ellipse cx="1.1" cy="-1.3" rx="16.5" ry="24.2" stroke-dasharray="125 1.5" />
    <ellipse cx="-1.2" cy="1.4" rx="18.0" ry="26.4" />
  </g>

  <!-- Scattered Dust Speckles -->
  <g fill="white" opacity="0.12">
    <circle cx="80" cy="90" r="0.8" />
    <circle cx="220" cy="75" r="1.2" />
    <circle cx="350" cy="180" r="0.7" />
    <circle cx="130" cy="280" r="1.0" />
    <circle cx="400" cy="310" r="0.9" />
    <circle cx="160" cy="320" r="1.1" />
  </g>
</svg>
