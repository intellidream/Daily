<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Soft radial gradients for smudges -->
    <radialGradient id="smudge1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.14" />
      <stop offset="60%" stop-color="white" stop-opacity="0.07" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.11" />
      <stop offset="50%" stop-color="white" stop-opacity="0.04" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.09" />
      <stop offset="70%" stop-color="white" stop-opacity="0.02" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>

    <!-- Linear gradient for swipe marks that fades at the edges -->
    <linearGradient id="swipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="20%" stop-color="white" stop-opacity="0.07" />
      <stop offset="50%" stop-color="white" stop-opacity="0.11" />
      <stop offset="80%" stop-color="white" stop-opacity="0.07" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Oily Smudges -->
  <!-- Swipe mark at the bottom -->
  <path d="M 96 495 Q 304 450 704 510" fill="none" stroke="url(#swipeGrad)" stroke-width="70" stroke-linecap="round" />
  
  <!-- Finger smudge 1 -->
  <ellipse cx="256" cy="210" rx="96" ry="75" transform="rotate(-30 256 210)" fill="url(#smudge1)" />
  
  <!-- Large corner smear -->
  <ellipse cx="608" cy="180" rx="128" ry="150" transform="rotate(25 608 180)" fill="url(#smudge2)" />

  <!-- Center palm/hand drag -->
  <ellipse cx="416" cy="375" rx="112" ry="105" fill="url(#smudge3)" />

  <!-- Fingerprint 1 (Index Finger) -->
  <g transform="translate(256, 390) rotate(-40) scale(1.2)" stroke="white" stroke-width="0.24" fill="none" stroke-linecap="round" opacity="0.15">
    <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
    <ellipse cx="-0.1" cy="0.3" rx="3.0" ry="4.4" />
    <ellipse cx="-0.2" cy="0.6" rx="4.5" ry="6.6" stroke-dasharray="50 1.2" />
    <ellipse cx="-0.3" cy="0.9" rx="6.0" ry="8.8" />
    <ellipse cx="-0.4" cy="1.2" rx="7.5" ry="11.0" stroke-dasharray="70 1.2 50 1.2" />
    <ellipse cx="-0.6" cy="1.8" rx="9.0" ry="13.2" />
    <ellipse cx="-0.6" cy="1.8" rx="10.5" ry="15.4" stroke-dasharray="90 1.5" />
    <ellipse cx="-0.7" cy="2.1" rx="12.0" ry="17.6" />
    <ellipse cx="-0.8" cy="2.4" rx="13.5" ry="19.8" stroke-dasharray="110 1.5 80 1.5" />
    <ellipse cx="-0.9" cy="2.7" rx="15.0" ry="22.0" />
    <ellipse cx="-1.0" cy="3.0" rx="16.5" ry="24.2" stroke-dasharray="130 1.5" />
    <ellipse cx="-1.1" cy="3.3" rx="18.0" ry="26.4" />
    <ellipse cx="-1.2" cy="3.6" rx="19.5" ry="28.6" stroke-dasharray="150 1.5 100 1.5" />
    <ellipse cx="-1.3" cy="3.9" rx="21.0" ry="30.8" />
    <ellipse cx="-1.4" cy="4.2" rx="22.5" ry="33.0" />
    <ellipse cx="-1.5" cy="4.5" rx="24.0" ry="35.2" stroke-dasharray="170 1.5" />
    <ellipse cx="-1.6" cy="4.8" rx="25.5" ry="37.4" />
    <ellipse cx="-1.7" cy="5.1" rx="27.0" ry="39.6" />
    <ellipse cx="-1.8" cy="5.4" rx="28.5" ry="41.8" stroke-dasharray="190 1.5" />
    <ellipse cx="-1.9" cy="5.7" rx="30.0" ry="44.0" />
  </g>

  <!-- Fingerprint 2 (Middle Finger) -->
  <g transform="translate(544, 210) rotate(15) scale(1.05)" stroke="white" stroke-width="0.24" fill="none" stroke-linecap="round" opacity="0.15">
    <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
    <ellipse cx="0.2" cy="-0.3" rx="3.0" ry="4.4" />
    <ellipse cx="0.4" cy="-0.6" rx="4.5" ry="6.6" stroke-dasharray="50 1.2" />
    <ellipse cx="0.6" cy="-0.9" rx="6.0" ry="8.8" />
    <ellipse cx="0.8" cy="-1.2" rx="7.5" ry="11.0" stroke-dasharray="70 1.2 50 1.2" />
    <ellipse cx="1.0" cy="-1.5" rx="9.0" ry="13.2" />
    <ellipse cx="1.2" cy="-1.8" rx="10.5" ry="15.4" stroke-dasharray="90 1.5" />
    <ellipse cx="1.4" cy="-2.1" rx="12.0" ry="17.6" />
    <ellipse cx="1.6" cy="-2.4" rx="13.5" ry="19.8" stroke-dasharray="110 1.5 80 1.5" />
    <ellipse cx="1.8" cy="-2.7" rx="15.0" ry="22.0" />
    <ellipse cx="2.0" cy="-3.0" rx="16.5" ry="24.2" stroke-dasharray="130 1.5" />
    <ellipse cx="2.2" cy="-3.3" rx="18.0" ry="26.4" />
    <ellipse cx="2.4" cy="-3.6" rx="19.5" ry="28.6" stroke-dasharray="150 1.5 100 1.5" />
    <ellipse cx="2.6" cy="-3.9" rx="21.0" ry="30.8" />
    <ellipse cx="2.8" cy="-4.2" rx="22.5" ry="33.0" />
    <ellipse cx="3.0" cy="-4.5" rx="24.0" ry="35.2" stroke-dasharray="170 1.5" />
    <ellipse cx="3.2" cy="-4.8" rx="25.5" ry="37.4" />
    <ellipse cx="3.4" cy="-5.1" rx="27.0" ry="39.6" />
    <ellipse cx="3.6" cy="-5.4" rx="28.5" ry="41.8" stroke-dasharray="190 1.5" />
    <ellipse cx="3.8" cy="-5.7" rx="30.0" ry="44.0" />
  </g>

  <!-- Fingerprint 3 (Thumb) -->
  <g transform="translate(352, 180) rotate(-10) scale(1.1)" stroke="white" stroke-width="0.24" fill="none" stroke-linecap="round" opacity="0.17">
    <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
    <ellipse cx="-0.2" cy="0.4" rx="3.0" ry="4.4" />
    <ellipse cx="0.3" cy="-0.5" rx="4.5" ry="6.6" stroke-dasharray="50 1.2" />
    <ellipse cx="-0.4" cy="0.6" rx="6.0" ry="8.8" />
    <ellipse cx="0.5" cy="-0.7" rx="7.5" ry="11.0" stroke-dasharray="70 1.2 50 1.2" />
    <ellipse cx="-0.6" cy="0.8" rx="9.0" ry="13.2" />
    <ellipse cx="0.7" cy="-0.9" rx="10.5" ry="15.4" stroke-dasharray="90 1.5" />
    <ellipse cx="-0.8" cy="1.0" rx="12.0" ry="17.6" />
    <ellipse cx="0.9" cy="-1.1" rx="13.5" ry="19.8" stroke-dasharray="110 1.5 80 1.5" />
    <ellipse cx="-1.0" cy="1.2" rx="15.0" ry="22.0" />
    <ellipse cx="1.1" cy="-1.3" rx="16.5" ry="24.2" stroke-dasharray="130 1.5" />
    <ellipse cx="-1.2" cy="1.4" rx="18.0" ry="26.4" />
    <ellipse cx="1.3" cy="-1.5" rx="19.5" ry="28.6" stroke-dasharray="150 1.5 100 1.5" />
    <ellipse cx="-1.4" cy="1.6" rx="21.0" ry="30.8" />
    <ellipse cx="1.5" cy="-1.7" rx="22.5" ry="33.0" />
    <ellipse cx="-1.6" cy="1.8" rx="24.0" ry="35.2" stroke-dasharray="170 1.5" />
    <ellipse cx="1.7" cy="-1.9" rx="25.5" ry="37.4" />
    <ellipse cx="-1.8" cy="2.0" rx="27.0" ry="39.6" />
    <ellipse cx="1.9" cy="-2.1" rx="28.5" ry="41.8" stroke-dasharray="190 1.5" />
    <ellipse cx="-2.0" cy="2.2" rx="30.0" ry="44.0" />
  </g>

  <!-- Scattered Dust Speckles -->
  <g fill="white" opacity="0.09">
    <circle cx="128" cy="135" r="0.8" />
    <circle cx="352" cy="112.5" r="1.2" />
    <circle cx="560" cy="270" r="0.7" />
    <circle cx="208" cy="420" r="1.0" />
    <circle cx="640" cy="465" r="0.9" />
    <circle cx="256" cy="480" r="1.1" />
  </g>
</svg>
