<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <!-- Dark grease radial gradients -->
    <radialGradient id="smudge1_grease" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#332c25" stop-opacity="0.32" />
      <stop offset="60%" stop-color="#332c25" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#332c25" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge2_grease" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#332c25" stop-opacity="0.28" />
      <stop offset="50%" stop-color="#332c25" stop-opacity="0.13" />
      <stop offset="100%" stop-color="#332c25" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge3_grease" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#332c25" stop-opacity="0.26" />
      <stop offset="70%" stop-color="#332c25" stop-opacity="0.11" />
      <stop offset="100%" stop-color="#332c25" stop-opacity="0" />
    </radialGradient>

    <!-- White highlight radial gradients -->
    <radialGradient id="smudge1_highlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.48" />
      <stop offset="60%" stop-color="white" stop-opacity="0.20" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge2_highlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.42" />
      <stop offset="50%" stop-color="white" stop-opacity="0.24" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge3_highlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.38" />
      <stop offset="70%" stop-color="white" stop-opacity="0.24" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>

    <!-- Linear gradients for swipe marks -->
    <linearGradient id="swipeGrease" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#332c25" stop-opacity="0" />
      <stop offset="20%" stop-color="#332c25" stop-opacity="0.12" />
      <stop offset="50%" stop-color="#332c25" stop-opacity="0.26" />
      <stop offset="80%" stop-color="#332c25" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#332c25" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="swipeHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="20%" stop-color="white" stop-opacity="0.24" />
      <stop offset="50%" stop-color="white" stop-opacity="0.48" />
      <stop offset="80%" stop-color="white" stop-opacity="0.24" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Oily Smudges -->
  <!-- Swipe mark at the bottom -->
  <path d="M 40.6 320.6 Q 180.6 290.6 420.6 350.6" fill="none" stroke="url(#swipeHighlight)" stroke-width="45" stroke-linecap="round" />
  <path d="M 40 320 Q 180 290 420 350" fill="none" stroke="url(#swipeGrease)" stroke-width="44" stroke-linecap="round" />
  
  <!-- Finger smudge 1 -->
  <ellipse cx="140.6" cy="110.6" rx="40" ry="60" transform="rotate(-15 140.6 110.6)" fill="url(#smudge1_highlight)" />
  <ellipse cx="140" cy="110" rx="40" ry="60" transform="rotate(-15 140 110)" fill="url(#smudge1_grease)" />
  
  <!-- Large corner smear -->
  <ellipse cx="440.6" cy="90.6" rx="100" ry="80" transform="rotate(20 440.6 90.6)" fill="url(#smudge2_highlight)" />
  <ellipse cx="440" cy="90" rx="100" ry="80" transform="rotate(20 440 90)" fill="url(#smudge2_grease)" />

  <!-- Center palm/hand drag -->
  <ellipse cx="270.6" cy="220.6" rx="70" ry="70" fill="url(#smudge3_highlight)" />
  <ellipse cx="270" cy="220" rx="70" ry="70" fill="url(#smudge3_grease)" />

  <!-- Fingerprint 1 (Index Finger) - Elliptical Whorl -->
  <g transform="translate(150, 130) rotate(-15) scale(1.1)">
    <!-- White refracting highlight layer (offset by 0.6px) -->
    <g stroke="white" stroke-width="0.45" fill="none" stroke-linecap="round" opacity="0.42" transform="translate(0.8, 0.8)">
      <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
      <ellipse cx="0.1" cy="-0.2" rx="3.0" ry="4.4" />
      <ellipse cx="0.3" cy="-0.4" rx="4.5" ry="6.6" stroke-dasharray="40 1.2" />
      <ellipse cx="0.5" cy="-0.6" rx="6.0" ry="8.8" />
      <ellipse cx="0.7" cy="-0.8" rx="7.5" ry="11.0" stroke-dasharray="60 1.2 40 1.2" />
      <ellipse cx="0.9" cy="-1.0" rx="9.0" ry="13.2" />
      <ellipse cx="1.1" cy="-1.2" rx="10.5" ry="15.4" stroke-dasharray="80 1.5" />
      <ellipse cx="1.3" cy="-1.4" rx="12.0" ry="17.6" />
      <ellipse cx="1.5" cy="-1.6" rx="13.5" ry="19.8" stroke-dasharray="100 1.5 70 1.5" />
      <ellipse cx="1.7" cy="-1.8" rx="15.0" ry="22.0" />
      <ellipse cx="1.9" cy="-2.0" rx="16.5" ry="24.2" stroke-dasharray="120 1.5" />
      <ellipse cx="2.1" cy="-2.2" rx="18.0" ry="26.4" />
    </g>
    <!-- Dark grease layer -->
    <g stroke="#332c25" stroke-width="0.45" fill="none" stroke-linecap="round" opacity="0.32">
      <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
      <ellipse cx="0.1" cy="-0.2" rx="3.0" ry="4.4" />
      <ellipse cx="0.3" cy="-0.4" rx="4.5" ry="6.6" stroke-dasharray="40 1.2" />
      <ellipse cx="0.5" cy="-0.6" rx="6.0" ry="8.8" />
      <ellipse cx="0.7" cy="-0.8" rx="7.5" ry="11.0" stroke-dasharray="60 1.2 40 1.2" />
      <ellipse cx="0.9" cy="-1.0" rx="9.0" ry="13.2" />
      <ellipse cx="1.1" cy="-1.2" rx="10.5" ry="15.4" stroke-dasharray="80 1.5" />
      <ellipse cx="1.3" cy="-1.4" rx="12.0" ry="17.6" />
      <ellipse cx="1.5" cy="-1.6" rx="13.5" ry="19.8" stroke-dasharray="100 1.5 70 1.5" />
      <ellipse cx="1.7" cy="-1.8" rx="15.0" ry="22.0" />
      <ellipse cx="1.9" cy="-2.0" rx="16.5" ry="24.2" stroke-dasharray="120 1.5" />
      <ellipse cx="2.1" cy="-2.2" rx="18.0" ry="26.4" />
    </g>
  </g>

  <!-- Fingerprint 2 (Middle Finger) - Elliptical Loop -->
  <g transform="translate(350, 160) rotate(10) scale(1.0)">
    <!-- White refracting highlight layer (offset by 0.6px) -->
    <g stroke="white" stroke-width="0.45" fill="none" stroke-linecap="round" opacity="0.42" transform="translate(0.8, 0.8)">
      <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
      <ellipse cx="0.2" cy="0.4" rx="3.0" ry="4.4" />
      <ellipse cx="0.4" cy="0.8" rx="4.5" ry="6.6" stroke-dasharray="45 1.2" />
      <ellipse cx="0.6" cy="1.2" rx="6.0" ry="8.8" />
      <ellipse cx="0.8" cy="1.6" rx="7.5" ry="11.0" stroke-dasharray="65 1.2 35 1.2" />
      <ellipse cx="1.0" cy="2.0" rx="9.0" ry="13.2" />
      <ellipse cx="1.2" cy="2.4" rx="10.5" ry="15.4" stroke-dasharray="85 1.5" />
      <ellipse cx="1.4" cy="2.8" rx="12.0" ry="17.6" />
      <ellipse cx="1.6" cy="3.2" rx="13.5" ry="19.8" stroke-dasharray="105 1.5 65 1.5" />
      <ellipse cx="1.8" cy="3.6" rx="15.0" ry="22.0" />
      <ellipse cx="2.0" cy="4.0" rx="16.5" ry="24.2" stroke-dasharray="125 1.5" />
      <ellipse cx="2.2" cy="4.4" rx="18.0" ry="26.4" />
    </g>
    <!-- Dark grease layer -->
    <g stroke="#332c25" stroke-width="0.45" fill="none" stroke-linecap="round" opacity="0.32">
      <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
      <ellipse cx="0.2" cy="0.4" rx="3.0" ry="4.4" />
      <ellipse cx="0.4" cy="0.8" rx="4.5" ry="6.6" stroke-dasharray="45 1.2" />
      <ellipse cx="0.6" cy="1.2" rx="6.0" ry="8.8" />
      <ellipse cx="0.8" cy="1.6" rx="7.5" ry="11.0" stroke-dasharray="65 1.2 35 1.2" />
      <ellipse cx="1.0" cy="2.0" rx="9.0" ry="13.2" />
      <ellipse cx="1.2" cy="2.4" rx="10.5" ry="15.4" stroke-dasharray="85 1.5" />
      <ellipse cx="1.4" cy="2.8" rx="12.0" ry="17.6" />
      <ellipse cx="1.6" cy="3.2" rx="13.5" ry="19.8" stroke-dasharray="105 1.5 65 1.5" />
      <ellipse cx="1.8" cy="3.6" rx="15.0" ry="22.0" />
      <ellipse cx="2.0" cy="4.0" rx="16.5" ry="24.2" stroke-dasharray="125 1.5" />
      <ellipse cx="2.2" cy="4.4" rx="18.0" ry="26.4" />
    </g>
  </g>

  <!-- Fingerprint 3 (Thumb) - Elliptical Double Loop -->
  <g transform="translate(240, 280) rotate(-35) scale(1.2)">
    <!-- White refracting highlight layer (offset by 0.6px) -->
    <g stroke="white" stroke-width="0.45" fill="none" stroke-linecap="round" opacity="0.42" transform="translate(0.8, 0.8)">
      <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
      <ellipse cx="-0.2" cy="0.3" rx="3.0" ry="4.4" />
      <ellipse cx="0.3" cy="-0.4" rx="4.5" ry="6.6" stroke-dasharray="50 1.2" />
      <ellipse cx="-0.4" cy="0.5" rx="6.0" ry="8.8" />
      <ellipse cx="0.5" cy="-0.6" rx="7.5" ry="11.0" stroke-dasharray="70 1.2 50 1.2" />
      <ellipse cx="-0.6" cy="0.7" rx="9.0" ry="13.2" />
      <ellipse cx="0.7" cy="-0.8" rx="10.5" ry="15.4" stroke-dasharray="90 1.5" />
      <ellipse cx="-0.8" cy="0.9" rx="12.0" ry="17.6" />
      <ellipse cx="0.9" cy="-1.0" rx="13.5" ry="19.8" stroke-dasharray="110 1.5 80 1.5" />
      <ellipse cx="-1.0" cy="1.1" rx="15.0" ry="22.0" />
      <ellipse cx="1.1" cy="-1.2" rx="16.5" ry="24.2" stroke-dasharray="130 1.5" />
      <ellipse cx="-1.2" cy="1.3" rx="18.0" ry="26.4" />
    </g>
    <!-- Dark grease layer -->
    <g stroke="#332c25" stroke-width="0.45" fill="none" stroke-linecap="round" opacity="0.32">
      <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
      <ellipse cx="-0.2" cy="0.3" rx="3.0" ry="4.4" />
      <ellipse cx="0.3" cy="-0.4" rx="4.5" ry="6.6" stroke-dasharray="50 1.2" />
      <ellipse cx="-0.4" cy="0.5" rx="6.0" ry="8.8" />
      <ellipse cx="0.5" cy="-0.6" rx="7.5" ry="11.0" stroke-dasharray="70 1.2 50 1.2" />
      <ellipse cx="-0.6" cy="0.7" rx="9.0" ry="13.2" />
      <ellipse cx="0.7" cy="-0.8" rx="10.5" ry="15.4" stroke-dasharray="90 1.5" />
      <ellipse cx="-0.8" cy="0.9" rx="12.0" ry="17.6" />
      <ellipse cx="0.9" cy="-1.0" rx="13.5" ry="19.8" stroke-dasharray="110 1.5 80 1.5" />
      <ellipse cx="-1.0" cy="1.1" rx="15.0" ry="22.0" />
      <ellipse cx="1.1" cy="-1.2" rx="16.5" ry="24.2" stroke-dasharray="130 1.5" />
      <ellipse cx="-1.2" cy="1.3" rx="18.0" ry="26.4" />
    </g>
  </g>

  <!-- 3D Refracting Dust Speckles -->
  <g fill="white" opacity="0.44" transform="translate(0.8, 0.8)">
    <circle cx="70.6" cy="80.6" r="0.7" />
    <circle cx="210.6" cy="65.6" r="1.1" />
    <circle cx="340.6" cy="170.6" r="0.6" />
    <circle cx="120.6" cy="270.6" r="1.2" />
    <circle cx="390.6" cy="300.6" r="0.8" />
    <circle cx="150.6" cy="310.6" r="1.0" />
    <circle cx="430.6" cy="230.6" r="0.7" />
    <circle cx="50.6" cy="180.6" r="1.1" />
    <circle cx="280.6" cy="40.6" r="0.8" />
    <circle cx="310.6" cy="120.6" r="0.6" />
    <circle cx="190.6" cy="290.6" r="1.2" />
  </g>
  <g fill="#332c25" opacity="0.28">
    <circle cx="70" cy="80" r="0.7" />
    <circle cx="210" cy="65" r="1.1" />
    <circle cx="340" cy="170" r="0.6" />
    <circle cx="120" cy="270" r="1.2" />
    <circle cx="390" cy="300" r="0.8" />
    <circle cx="150" cy="310" r="1.0" />
    <circle cx="430" cy="230" r="0.7" />
    <circle cx="50" cy="180" r="1.1" />
    <circle cx="280" cy="40" r="0.8" />
    <circle cx="310" cy="120" r="0.6" />
    <circle cx="190" cy="290" r="1.2" />
  </g>
</svg>
