<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Soft radial gradients for smudges -->
    <radialGradient id="smudge1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.14" />
      <stop offset="60%" stop-color="white" stop-opacity="0.07" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.11" />
      <stop offset="50%" stop-color="white" stop-opacity="0.04" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.09" />
      <stop offset="70%" stop-color="white" stop-opacity="0.02" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>

    <!-- Linear gradient for swipe marks that fades at the edges -->
    <linearGradient id="swipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="20%" stop-color="white" stop-opacity="0.07" />
      <stop offset="50%" stop-color="white" stop-opacity="0.11" />
      <stop offset="80%" stop-color="white" stop-opacity="0.07" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Oily Smudges -->
  <!-- Swipe mark at the bottom -->
  <path d="M 60 480 Q 280 430 740 520" fill="none" stroke="url(#swipeGrad)" stroke-width="70" stroke-linecap="round" />
  
  <!-- Finger smudge 1 -->
  <ellipse cx="220" cy="180" rx="70" ry="90" transform="rotate(-15 220 180)" fill="url(#smudge1)" />
  
  <!-- Large corner smear -->
  <ellipse cx="680" cy="150" rx="140" ry="110" transform="rotate(20 680 150)" fill="url(#smudge2)" />

  <!-- Center palm/hand drag -->
  <ellipse cx="400" cy="350" rx="110" ry="100" fill="url(#smudge3)" />

  <!-- Fingerprint 1 (Index Finger) - Elliptical Whorl -->
  <g transform="translate(220, 180) rotate(-15) scale(1.2)" stroke="white" stroke-width="0.24" fill="none" stroke-linecap="round" opacity="0.15">
    <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
    <ellipse cx="0.1" cy="-0.2" rx="3.0" ry="4.4" />
    <ellipse cx="0.2" cy="-0.4" rx="4.5" ry="6.6" />
    <ellipse cx="0.3" cy="-0.6" rx="6.0" ry="8.8" stroke-dasharray="50 1.2" />
    <ellipse cx="0.4" cy="-0.8" rx="7.5" ry="11.0" />
    <ellipse cx="0.5" cy="-1.0" rx="9.0" ry="13.2" />
    <ellipse cx="0.6" cy="-1.2" rx="10.5" ry="15.4" stroke-dasharray="70 1.2 50 1.2" />
    <ellipse cx="0.7" cy="-1.4" rx="12.0" ry="17.6" />
    <ellipse cx="0.8" cy="-1.6" rx="13.5" ry="19.8" />
    <ellipse cx="0.9" cy="-1.8" rx="15.0" ry="22.0" stroke-dasharray="90 1.5" />
    <ellipse cx="1.0" cy="-2.0" rx="16.5" ry="24.2" />
    <ellipse cx="1.1" cy="-2.2" rx="18.0" ry="26.4" />
    <ellipse cx="1.2" cy="-2.4" rx="19.5" ry="28.6" stroke-dasharray="110 1.5 80 1.5" />
    <ellipse cx="1.3" cy="-2.6" rx="21.0" ry="30.8" />
    <ellipse cx="1.4" cy="-2.8" rx="22.5" ry="33.0" />
    <ellipse cx="1.5" cy="-3.0" rx="24.0" ry="35.2" stroke-dasharray="130 1.5" />
    <ellipse cx="1.6" cy="-3.2" rx="25.5" ry="37.4" />
    <ellipse cx="1.7" cy="-3.4" rx="27.0" ry="39.6" />
    <ellipse cx="1.8" cy="-3.6" rx="28.5" ry="41.8" stroke-dasharray="150 1.5" />
    <ellipse cx="1.9" cy="-3.8" rx="30.0" ry="44.0" />
  </g>

  <!-- Fingerprint 2 (Middle Finger) - Elliptical Loop -->
  <g transform="translate(580, 220) rotate(10) scale(1.15)" stroke="white" stroke-width="0.24" fill="none" stroke-linecap="round" opacity="0.15">
    <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
    <ellipse cx="0.2" cy="0.4" rx="3.0" ry="4.4" />
    <ellipse cx="0.4" cy="0.8" rx="4.5" ry="6.6" />
    <ellipse cx="0.6" cy="1.2" rx="6.0" ry="8.8" stroke-dasharray="55 1.2" />
    <ellipse cx="0.8" cy="1.6" rx="7.5" ry="11.0" />
    <ellipse cx="1.0" cy="2.0" rx="9.0" ry="13.2" />
    <ellipse cx="1.2" cy="2.4" rx="10.5" ry="15.4" stroke-dasharray="75 1.2 55 1.2" />
    <ellipse cx="1.4" cy="2.8" rx="12.0" ry="17.6" />
    <ellipse cx="1.6" cy="3.2" rx="13.5" ry="19.8" />
    <ellipse cx="1.8" cy="3.6" rx="15.0" ry="22.0" stroke-dasharray="95 1.5" />
    <ellipse cx="2.0" cy="4.0" rx="16.5" ry="24.2" />
    <ellipse cx="2.2" cy="4.4" rx="18.0" ry="26.4" />
    <ellipse cx="2.4" cy="4.8" rx="19.5" ry="28.6" stroke-dasharray="115 1.5 85 1.5" />
    <ellipse cx="2.6" cy="5.2" rx="21.0" ry="30.8" />
    <ellipse cx="2.8" cy="5.6" rx="22.5" ry="33.0" />
    <ellipse cx="3.0" cy="6.0" rx="24.0" ry="35.2" stroke-dasharray="135 1.5" />
    <ellipse cx="3.2" cy="6.4" rx="25.5" ry="37.4" />
    <ellipse cx="3.4" cy="6.8" rx="27.0" ry="39.6" />
    <ellipse cx="3.6" cy="7.2" rx="28.5" ry="41.8" stroke-dasharray="155 1.5" />
    <ellipse cx="3.8" cy="7.6" rx="30.0" ry="44.0" />
  </g>

  <!-- Fingerprint 3 (Thumb) - Elliptical Double Loop -->
  <g transform="translate(380, 420) rotate(-35) scale(1.3)" stroke="white" stroke-width="0.24" fill="none" stroke-linecap="round" opacity="0.17">
    <ellipse cx="0" cy="0" rx="1.5" ry="2.2" />
    <ellipse cx="-0.2" cy="0.3" rx="3.0" ry="4.4" />
    <ellipse cx="0.3" cy="-0.4" rx="4.5" ry="6.6" />
    <ellipse cx="-0.4" cy="0.5" rx="6.0" ry="8.8" stroke-dasharray="60 1.2" />
    <ellipse cx="0.5" cy="-0.6" rx="7.5" ry="11.0" />
    <ellipse cx="-0.6" cy="0.7" rx="9.0" ry="13.2" />
    <ellipse cx="0.7" cy="-0.8" rx="10.5" ry="15.4" stroke-dasharray="80 1.2 60 1.2" />
    <ellipse cx="-0.8" cy="0.9" rx="12.0" ry="17.6" />
    <ellipse cx="0.9" cy="-1.0" rx="13.5" ry="19.8" />
    <ellipse cx="-1.0" cy="1.1" rx="15.0" ry="22.0" stroke-dasharray="100 1.5" />
    <ellipse cx="1.1" cy="-1.2" rx="16.5" ry="24.2" />
    <ellipse cx="-1.2" cy="1.3" rx="18.0" ry="26.4" />
    <ellipse cx="1.3" cy="-1.4" rx="19.5" ry="28.6" stroke-dasharray="120 1.5 90 1.5" />
    <ellipse cx="-1.4" cy="1.5" rx="21.0" ry="30.8" />
    <ellipse cx="1.5" cy="-1.6" rx="22.5" ry="33.0" />
    <ellipse cx="-1.6" cy="1.7" rx="24.0" ry="35.2" stroke-dasharray="140 1.5" />
    <ellipse cx="1.7" cy="-1.8" rx="25.5" ry="37.4" />
    <ellipse cx="-1.8" cy="1.9" rx="27.0" ry="39.6" />
    <ellipse cx="1.9" cy="-2.0" rx="28.5" ry="41.8" stroke-dasharray="160 1.5" />
    <ellipse cx="-2.0" cy="2.1" rx="30.0" ry="44.0" />
  </g>

  <!-- Scattered Dust Speckles -->
  <g fill="white" opacity="0.09">
    <circle cx="100" cy="120" r="0.7" />
    <circle cx="310" cy="95" r="1.1" />
    <circle cx="540" cy="270" r="0.6" />
    <circle cx="180" cy="370" r="1.2" />
    <circle cx="600" cy="450" r="0.8" />
    <circle cx="220" cy="480" r="1.0" />
    <circle cx="680" cy="330" r="0.7" />
    <circle cx="80" cy="280" r="1.1" />
    <circle cx="420" cy="60" r="0.8" />
  </g>
</svg>
