<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <!-- Procedural fractal noise filter -->
    <filter id="dust-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
      <feColorMatrix type="matrix" values="
        1 0 0 0 0.3
        0 1 0 0 0.3
        0 0 1 0 0.3
        0 0 0 0.14 0" />
    </filter>
    
    <!-- Dense tileable pattern of tiny vector dust specks as fallback -->
    <pattern id="dust-fallback" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="3" r="0.4" fill="#505050" opacity="0.30" />
      <circle cx="12" cy="7" r="0.6" fill="#505050" opacity="0.20" />
      <circle cx="25" cy="4" r="0.3" fill="#505050" opacity="0.40" />
      <circle cx="8" cy="18" r="0.5" fill="#505050" opacity="0.25" />
      <circle cx="33" cy="12" r="0.4" fill="#505050" opacity="0.35" />
      <circle cx="19" cy="28" r="0.5" fill="#505050" opacity="0.20" />
      <circle cx="29" cy="22" r="0.6" fill="#505050" opacity="0.30" />
      <circle cx="5" cy="34" r="0.3" fill="#505050" opacity="0.40" />
      <circle cx="14" cy="38" r="0.5" fill="#505050" opacity="0.20" />
      <circle cx="38" cy="32" r="0.4" fill="#505050" opacity="0.30" />
      <!-- Subtle secondary specs for depth -->
      <circle cx="22" cy="15" r="0.5" fill="#666666" opacity="0.15" />
      <circle cx="31" cy="5" r="0.4" fill="#666666" opacity="0.20" />
      <circle cx="10" cy="25" r="0.6" fill="#666666" opacity="0.15" />
      <circle cx="3" cy="11" r="0.5" fill="#777777" opacity="0.25" />
      <circle cx="17" cy="21" r="0.3" fill="#777777" opacity="0.35" />
      <circle cx="26" cy="36" r="0.5" fill="#777777" opacity="0.15" />
    </pattern>
  </defs>

  <!-- Applies the procedural noise filter (with fallback pattern) -->
  <rect width="100%" height="100%" filter="url(#dust-noise)" fill="url(#dust-fallback)" />
</svg>
