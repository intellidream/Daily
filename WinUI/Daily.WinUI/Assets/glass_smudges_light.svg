<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <!-- Soft radial gradients for smudges -->
    <radialGradient id="smudge1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#505050" stop-opacity="0.15" />
      <stop offset="60%" stop-color="#505050" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#505050" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#505050" stop-opacity="0.12" />
      <stop offset="50%" stop-color="#505050" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#505050" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="smudge3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#505050" stop-opacity="0.10" />
      <stop offset="70%" stop-color="#505050" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#505050" stop-opacity="0" />
    </radialGradient>

    <!-- Linear gradient for swipe marks that fades at the edges -->
    <linearGradient id="swipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#505050" stop-opacity="0" />
      <stop offset="20%" stop-color="#505050" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#505050" stop-opacity="0.12" />
      <stop offset="80%" stop-color="#505050" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#505050" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Oily Smudges -->
  <!-- Swipe mark at the bottom -->
  <path d="M 40 320 Q 180 290 420 350" fill="none" stroke="url(#swipeGrad)" stroke-width="45" stroke-linecap="round" />
  
  <!-- Finger smudge 1 -->
  <ellipse cx="140" cy="110" rx="40" ry="60" transform="rotate(-15 140 110)" fill="url(#smudge1)" />
  
  <!-- Large corner smear -->
  <ellipse cx="440" cy="90" rx="100" ry="80" transform="rotate(20 440 90)" fill="url(#smudge2)" />

  <!-- Center palm/hand drag -->
  <ellipse cx="270" cy="220" rx="70" ry="70" fill="url(#smudge3)" />

  <!-- Fingerprints (Thin concentric ellipses representing whorls) -->
  <!-- Fingerprint 1 (Index Finger) -->
  <g transform="translate(250, 130) rotate(-12)" stroke="#505050" stroke-width="0.75" fill="none" opacity="0.18">
    <ellipse cx="0" cy="0" rx="14" ry="22" />
    <ellipse cx="-0.5" cy="0" rx="12" ry="19" />
    <ellipse cx="-1.0" cy="0" rx="10" ry="16" />
    <ellipse cx="-1.5" cy="0" rx="8" ry="13" />
    <ellipse cx="-2.0" cy="0" rx="6" ry="10" />
    <ellipse cx="-2.5" cy="0" rx="4" ry="7" />
    <ellipse cx="-3.0" cy="0" rx="2" ry="4" />
  </g>

  <!-- Fingerprint 2 (Middle Finger) -->
  <g transform="translate(285, 105) rotate(-6)" stroke="#505050" stroke-width="0.75" fill="none" opacity="0.18">
    <ellipse cx="0" cy="0" rx="16" ry="25" />
    <ellipse cx="-0.6" cy="0" rx="14" ry="22" />
    <ellipse cx="-1.2" cy="0" rx="12" ry="19" />
    <ellipse cx="-1.8" cy="0" rx="10" ry="16" />
    <ellipse cx="-2.4" cy="0" rx="8" ry="13" />
    <ellipse cx="-3.0" cy="0" rx="6" ry="10" />
    <ellipse cx="-3.6" cy="0" rx="4" ry="7" />
    <ellipse cx="-4.2" cy="0" rx="2" ry="4" />
  </g>

  <!-- Fingerprint 3 (Thumb) -->
  <g transform="translate(180, 230) rotate(-35)" stroke="#505050" stroke-width="0.85" fill="none" opacity="0.20">
    <ellipse cx="0" cy="0" rx="20" ry="30" />
    <ellipse cx="-0.8" cy="0" rx="18" ry="27" />
    <ellipse cx="-1.6" cy="0" rx="16" ry="24" />
    <ellipse cx="-2.4" cy="0" rx="14" ry="21" />
    <ellipse cx="-3.2" cy="0" rx="12" ry="18" />
    <ellipse cx="-4.0" cy="0" rx="10" ry="15" />
    <ellipse cx="-4.8" cy="0" rx="8" ry="12" />
    <ellipse cx="-5.6" cy="0" rx="6" ry="9" />
    <ellipse cx="-6.4" cy="0" rx="4" ry="6" />
    <ellipse cx="-7.2" cy="0" rx="2" ry="3" />
  </g>
</svg>
